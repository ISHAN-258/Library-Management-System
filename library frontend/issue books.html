<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issue Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .sidebar {
      width: 280px;
      background: #2c3e50;
      color: white;
      padding: 0;
      position: fixed;
      height: 100vh;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: all 0.3s;
    }

    .sidebar-header {
      padding: 20px;
      background: #1a252f;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .sidebar-menu {
      padding: 15px 0;
    }

    .sidebar-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar-menu li a {
      color: #ecf0f1;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 12px 20px;
      transition: all 0.3s;
    }

    .sidebar-menu li a:hover {
      background: #34495e;
      color: #fff;
    }

    .sidebar-menu li a i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }

    .sidebar-menu li.active a {
      background: #3498db;
      color: white;
    }

    .main-content {
      flex-grow: 1;
      padding: 30px;
      margin-left: 280px;
    }

    .form-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    h2 {
      font-weight: 600;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2><i class="fas fa-book"></i> LIBRARIAN DASHBOARD</h2>
    </div>
    <div class="sidebar-menu">
      <ul>
        <li><a href="books.html"><i class="fas fa-book"></i> Books</a></li>
        <li><a href="studentadd.html"><i class="fas fa-user-plus"></i> Student</a></li>
        <li><a href="issued book.html"><i class="fas fa-book-reader"></i> Books Issued</a></li>
        <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
        <li><a href="issue books.html"><i class="fas fa-sign-out-alt"></i> Issue Book</a></li>
        <li><a href="fine.html"><i class="fas fa-coins"></i> Fine</a></li>
        <li><a href="viewrequested_book.html"><i class="fas fa-book-open"></i> Requested Books</a></li>
        <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </div>
  </aside>

  <main class="main-content">
    <div class="form-container">
      <h2>📘 Issue Book Form</h2>
      <form id="issueBookForm">
        <div class="mb-3">
          <label for="bookId" class="form-label">Book ID</label>
          <input type="text" class="form-control" id="bookId" required />
        </div>
        <div class="mb-3">
          <label for="bookTitle" class="form-label">Book Title</label>
          <input type="text" class="form-control" id="bookTitle" required />
        </div>
        <div class="mb-3">
          <label for="studentEmail" class="form-label">Student Email ID</label>
          <input type="email" class="form-control" id="studentEmail" required />
        </div>
        <div class="mb-3">
          <label for="issueDate" class="form-label">Issue Date</label>
          <input type="date" class="form-control" id="issueDate" required />
        </div>
        <div class="mb-3">
          <label for="returnDate" class="form-label">Return Date</label>
          <input type="date" class="form-control" id="returnDate" required />
        </div>
        <button type="submit" class="btn btn-primary">Issue Book</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('issueBookForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const bookId = document.getElementById('bookId').value;
      const bookTitle = document.getElementById('bookTitle').value;
      const studentEmail = document.getElementById('studentEmail').value;
      const issueDate = document.getElementById('issueDate').value;
      const returnDate = document.getElementById('returnDate').value;

      fetch('http://localhost:3000/api/issues/issue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          bookId,
          bookTitle,
          studentEmail,
          issueDate,
          returnDate,
          status: 'Pending'
        })
      })
      .then(res => res.json())
      .then(data => {
        alert('Book Issued Successfully!');
        document.getElementById('issueBookForm').reset();
        
        // Send email via GET request
        const emailParams = new URLSearchParams({
          to: studentEmail,
          subject: `Book Issued: ${bookTitle}`,
          body: `Dear Student,\n\nYou have been issued the book "${bookTitle}" (ID: ${bookId}).\n\nIssue Date: ${issueDate}\nReturn Date: ${returnDate}\n\nThank you,\nLibrary Management System`
        });
        
        fetch(`http://localhost:3000/api/email/send?${emailParams.toString()}`)
          .then(res => {
            if (!res.ok) throw new Error('Email failed');
            console.log('Email sent successfully');
          })
          .catch(err => console.error('Email error:', err));
      })
      .catch(err => {
        console.error('Error:', err);
        alert('Failed to issue book.');
      });
    });
  </script>
</body>
</html>
