<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logout - Student Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      overflow-x: hidden;
      margin: 0;
    }

    .dashboard-container {
      display: flex;
      flex-direction: column;
    }

    .sidebar {
      width: 250px;
      background: #007bff;
      color: white;
      height: 100vh;
      padding: 20px;
      position: fixed;
      transition: all 0.3s;
      z-index: 1000;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar ul li a {
      color: white;
      text-decoration: none;
      display: block;
    }

    .sidebar ul li:hover {
      background: rgba(255,255,255,0.1);
    }

    .main-content {
      margin-left: 250px;
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .logout-card {
      background-color: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .logout-card h3 {
      margin-bottom: 20px;
      color: #dc3545;
    }

    .logout-card p {
      margin-bottom: 30px;
      color: #555;
    }

    .btn-login {
      background-color: #007bff;
      color: white;
      padding: 10px 25px;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn-login:hover {
      background-color: #0056b3;
    }

    .menu-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      background: #007bff;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 1001;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-250px);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
        padding: 20px;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menuToggle">☰ Menu</button>

  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <h2>Student Panel</h2>
      <ul>
        <!-- <li><a href="student dashboard.html"><i class="fas fa-book"></i>dashboard-container</a></li> -->
        <li><a href="viewissuedbook.html"><i class="fas fa-book"></i> View Issued Books</a></li>
        <li><a href="search book.html"><i class="fas fa-search"></i> Search Books</a></li>
        <li><a href="student profile.html"><i class="fas fa-user"></i> Profile</a></li>
        <li><a href="logout_student2.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="logout-card">
        <h3>👋 You have been logged out</h3>
        <p>Thank you for using the Student Panel.</p>
        <a href="login.html" class="btn-login">Login Again</a>
      </div>
    </main>
  </div>

  <script>
    document.getElementById('menuToggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('active');
    });
  </script>

</body>
</html>
