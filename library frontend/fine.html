<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fine Calculator - Librarian Dashboard</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Font Awesome CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <!-- Dashboard Styles (Combined and Adjusted) -->
  <style>
    /* Copied from your provided dashboard CSS */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Updated font */
      margin: 0;
      display: flex;
      min-height: 100vh; /* Use min-height */
      background-color: #f0f2f5; /* Slightly lighter background */
    }
    .dashboard-container {
      display: flex;
      width: 100%;
    }
    .sidebar {
      width: 280px; /* Adjusted width */
      background: #2c3e50;
      color: white;
      padding: 0; /* Remove padding here, handled by inner elements */
      position: fixed;
      top: 0; /* Ensure it sticks to top */
      left: 0; /* Ensure it sticks to left */
      height: 100vh;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: all 0.3s;
      z-index: 1000; /* Ensure sidebar stays on top */
      display: flex; /* Use flex for vertical alignment */
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      background: #1a252f;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0; /* Prevent header from shrinking */
    }
    .sidebar-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 600;
      display: flex; /* Align icon and text */
      align-items: center;
    }
    .sidebar-header i {
        margin-right: 10px; /* Space between icon and text */
    }

    .sidebar-menu {
      padding: 15px 0;
      overflow-y: auto; /* Allow scrolling if menu is long */
      flex-grow: 1; /* Allow menu to take remaining space */
    }
    .sidebar-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar-menu li {
      position: relative; /* For potential future dropdowns or indicators */
    }
    .sidebar-menu li a {
      color: #ecf0f1;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 12px 20px;
      transition: all 0.2s ease-in-out; /* Slightly faster transition */
      font-size: 0.95rem; /* Slightly adjust font size */
    }
    .sidebar-menu li a:hover {
      background: #34495e;
      color: #fff;
    }
    .sidebar-menu li a i {
      margin-right: 12px; /* More space for icon */
      width: 20px;
      text-align: center;
      font-size: 1.1em; /* Slightly larger icons */
    }
    /* Active state styling */
    .sidebar-menu li.active > a { /* Target anchor directly inside active li */
      background: #3498db;
      color: white;
      font-weight: 500;
    }
    /* Optional: Add a subtle left border for active item */
    .sidebar-menu li.active > a::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 4px;
        background-color: #ffffff; /* Or use primary color #3498db */
        border-top-right-radius: 3px;
        border-bottom-right-radius: 3px;
    }

    .main-content {
      flex-grow: 1;
      padding: 25px; /* Consistent padding */
      margin-left: 280px; /* Match sidebar width */
      transition: all 0.3s;
      width: calc(100% - 280px); /* Ensure width calculation is correct */
    }

    /* Header specific to main content area (optional but good for consistency) */
    .page-header {
        background: white;
        padding: 15px 25px;
        border-radius: 8px;
        margin-bottom: 25px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .page-header h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
        color: #333;
    }

    /* Styling for the Fine Calculator Card */
    .calculator-card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 600px; /* Slightly wider */
      margin: 20px auto; /* Center card with some top margin */
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); /* Softer shadow */
    }

    .calculator-card h3 {
      margin-bottom: 25px;
      text-align: center;
      font-weight: 600;
      color: #2c3e50; /* Match sidebar color */
      display: flex;
      align-items: center;
      justify-content: center; /* Center icon and text */
    }
    .calculator-card h3 i {
        margin-right: 10px; /* Space between icon and title */
        color: #3498db; /* Use active color for icon */
    }


    .btn-calculate {
      width: 100%;
      margin-top: 20px;
      padding: 10px; /* Standard Bootstrap button padding */
      font-weight: 500;
    }

    /* Result display using Bootstrap alerts */
    #result {
      margin-top: 25px;
      font-weight: 500; /* Slightly less bold */
      text-align: center;
      font-size: 1rem; /* Standard text size */
      padding: 15px; /* Add padding */
      border-radius: 5px; /* Rounded corners */
    }
    /* Specific alert styles will be added dynamically by JS */

  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-university"></i> Librarian Panel</h2>
      </div>
      <div class="sidebar-menu">
        <ul>
          <!-- Add icons and check active state -->
          <li><a href="librariandashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
          <li><a href="books.html"><i class="fas fa-book"></i> Manage Books</a></li>
          <li><a href="studentadd.html"><i class="fas fa-user-plus"></i> Manage Students</a></li>
          <li><a href="issue books.html"><i class="fas fa-exchange-alt"></i> Issue/Return Books</a></li>
          <li><a href="issued book.html"><i class="fas fa-book-reader"></i> Issued Records</a></li>
          <li><a href="viewrequested_book.html"><i class="fas fa-book-open"></i> Requested Books</a></li>
          <li class="active"><a href="fine.html"><i class="fas fa-coins"></i> Calculate Fine</a></li>
          <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
          <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
          <!-- Note: Adjusted links based on common dashboard patterns,
               feel free to change hrefs and text as needed -->
        </ul>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Optional Page Header -->
      <header class="page-header">
        <h1>Fine Calculation</h1>
        <!-- You can add breadcrumbs or other elements here -->
      </header>

      <!-- Fine Calculator Card -->
      <div class="card calculator-card">
        <h3><i class="fas fa-calculator"></i> Fine Calculator</h3>
        <form id="fineForm">
          <div class="mb-3">
            <label for="dueDate" class="form-label">Enter Due Date:</label>
            <input type="date" id="dueDate" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-primary btn-calculate">
             <i class="fas fa-check-circle me-2"></i> Calculate Fine
          </button>
        </form>
        <!-- Result Area (will be styled by JS) -->
        <div id="result" class="mt-4">
            <!-- Fine result will appear here -->
        </div>
      </div>
    </div>
  </div><!-- End Dashboard Container -->

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Fine Calculation Script -->
  <script>
    document.getElementById("fineForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const dueDateInput = document.getElementById("dueDate").value;
      const resultDiv = document.getElementById("result");
      resultDiv.className = 'mt-4'; // Reset classes
      resultDiv.innerHTML = ''; // Clear previous result


      if (!dueDateInput) {
        resultDiv.classList.add('alert', 'alert-warning'); // Add Bootstrap alert classes
        resultDiv.textContent = "⚠️ Please enter a due date.";
        return;
      }

      const dueDate = new Date(dueDateInput);
      const currentDate = new Date();

      // Normalize time to 00:00:00 to compare dates accurately
      dueDate.setHours(0, 0, 0, 0);
      currentDate.setHours(0, 0, 0, 0);

      if (currentDate <= dueDate) {
        resultDiv.classList.add('alert', 'alert-success'); // Success style
        resultDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i> No fine. Book returned on or before the due date.';
        return;
      }

      // Calculate overdue days, skipping Thursdays (4) and Sundays (0)
      let fineDays = 0;
      let tempDate = new Date(dueDate);
      tempDate.setDate(tempDate.getDate() + 1); // Start checking from the day *after* due date

      while (tempDate <= currentDate) {
        const dayOfWeek = tempDate.getDay(); // 0=Sun, 1=Mon, ..., 4=Thu, ..., 6=Sat
        if (dayOfWeek !== 0 && dayOfWeek !== 4) { // If it's not Sunday or Thursday
          fineDays++;
        }
        // Move to the next day
        tempDate.setDate(tempDate.getDate() + 1);
      }


      if (fineDays <= 0) {
           resultDiv.classList.add('alert', 'alert-success');
           resultDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i> No fine applicable (overdue days fall on Thursday/Sunday).';
      } else {
           const fineAmount = fineDays * 5; // Assuming ₹5 per applicable day
           resultDiv.classList.add('alert', 'alert-danger'); // Danger style for fine
           resultDiv.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i> Total Fine: <strong>₹${fineAmount}</strong> <br><small>(${fineDays} applicable overdue day${fineDays !== 1 ? 's' : ''}, excluding Thursdays and Sundays)</small>`;
      }
    });
  </script>
</body>
</html>
