<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Requested Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f5f5f5;
      padding: 20px;
    }
    .table-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container table-container">
    <h2>📚 Requested Books</h2>
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Student Email</th>
          <th>Book Title</th>
          <th>Requested Date</th>
        </tr>
      </thead>
      <tbody id="bookRequestsTable">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const tableBody = document.getElementById("bookRequestsTable");

      try {
        const res = await fetch("http://localhost:3000/api/book-requests/email");
        const result = await res.json();

        if (!result || !Array.isArray(result.data)) {
          throw new Error("Invalid API response");
        }

        const requests = result.data;

        if (requests.length === 0) {
          tableBody.innerHTML = "<tr><td colspan='4'>No book requests found.</td></tr>";
          return;
        }

        tableBody.innerHTML = "";
        requests.forEach((req, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${req.email || "N/A"}</td>
            <td>${req.bookTitle || "N/A"}</td>
            <td>${new Date(req.createdAt).toLocaleDateString()}</td>
          `;
          tableBody.appendChild(row);
        });

      } catch (err) {
        console.error("Error fetching book requests:", err);
        tableBody.innerHTML = "<tr><td colspan='4' class='text-danger'>Failed to load book requests.</td></tr>";
      }
    });
  </script>
</body>
</html>
