<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f1f4f9;
      margin: 0;
      overflow-x: hidden;
    }

    .dashboard-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #343a40;
      color: #fff;
      position: fixed;
      height: 100vh;
      padding-top: 30px;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .sidebar h2 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 30px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar ul li {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar ul li a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: #fff;
      text-decoration: none;
      transition: background 0.3s;
    }

    .sidebar ul li a i {
      margin-right: 12px;
      width: 20px;
      text-align: center;
    }

    .sidebar ul li a:hover {
      background: #007bff;
    }

    .main-content {
      margin-left: 260px;
      padding: 40px 20px;
      transition: margin-left 0.3s ease;
      width: 100%;
    }

    .menu-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1100;
      background: #007bff;
      color: #fff;
      border: none;
      padding: 10px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <h2><i class="fas fa-user-graduate"></i> Student Panel</h2>
      <ul>
        <!-- <li><a href="student dashboard.html"><i class="fas fa-book"></i>dashboard-container</a></li> -->
        <li><a href="viewissuedbook.html"><i class="fas fa-book"></i> View Issued Books</a></li>
        <li><a href="search book.html"><i class="fas fa-search"></i> Search Books</a></li>
        <li><a href="student profile.html"><i class="fas fa-user"></i> Profile</a></li>
        <li><a href="logout_student2.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <h1 class="mb-3">📚 Welcome, Student</h1>
      <p>Use the sidebar to access different sections like issued books, search, profile, and logout.</p>
    </main>
  </div>

  <script>
    document.getElementById('menuToggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('active');
    });
  </script>

</body>
</html>
