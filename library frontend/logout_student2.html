<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logout - Student Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .dashboard-container {
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: #343a40;
      color: #fff;
      position: fixed;
      height: 100vh;
      padding-top: 30px;
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .sidebar h2 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 30px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar ul li {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar ul li a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: #fff;
      text-decoration: none;
      transition: background 0.3s;
    }

    .sidebar ul li a i {
      margin-right: 12px;
      width: 20px;
      text-align: center;
    }

    .sidebar ul li a:hover {
      background: #007bff;
    }

    .main-content {
      margin-left: 260px;
      padding: 40px 20px;
      width: 100%;
      transition: margin-left 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .logout-card {
      background-color: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .logout-card h3 {
      margin-bottom: 20px;
      color: #dc3545;
    }

    .logout-card p {
      margin-bottom: 30px;
      color: #555;
    }

    .btn-login {
      background-color: #007bff;
      color: white;
      padding: 10px 25px;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn-login:hover {
      background-color: #0056b3;
    }

    .menu-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      background: #007bff;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 1001;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <h2><i class="fas fa-user-graduate"></i> Student Panel</h2>
      <ul>
        <li><a href="viewissuedbook.html"><i class="fas fa-book"></i> View Issued Books</a></li>
        <li><a href="search book.html"><i class="fas fa-search"></i> Search Books</a></li>
        <li><a href="book_request.html"><i class="fas fa-envelope"></i> Book Request</a></li>
        <li><a href="student profile.html"><i class="fas fa-user"></i> Profile</a></li>
        <li><a href="logout_student2.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="logout-card">
        <h3>👋 You have been logged out</h3>
        <p>Thank you for using the Student Panel.</p>
        <a href="student.html" class="btn-login">Login Again</a>
      </div>
    </main>
  </div>

  <script>
    document.getElementById('menuToggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('active');
    });
  </script>

</body>
</html>
