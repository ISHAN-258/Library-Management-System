<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
    }

    .dashboard-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #2c3e50;
      color: white;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      transition: all 0.3s;
    }

    .sidebar-header {
      padding: 20px;
      background: #1a252f;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .sidebar-menu ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar-menu li a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: #ecf0f1;
      text-decoration: none;
      transition: background 0.3s;
    }

    .sidebar-menu li a:hover,
    .sidebar-menu li.active a {
      background: #3498db;
      color: white;
    }

    .sidebar-menu li a i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }

    .main-content {
      margin-left: 260px;
      padding: 40px 20px;
      width: 100%;
    }

    .menu-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      background: #343a40;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 4px;
      z-index: 1100;
      cursor: pointer;
    }

    .settings-container {
      max-width: 600px;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      margin: auto;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <!-- Menu Toggle for Mobile -->
  <button class="menu-toggle" id="menuToggle">☰</button>

  <div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-user-shield"></i> ADMIN PANEL</h2>
      </div>
      <div class="sidebar-menu">
        <ul>
          <li><a href="admindashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
          <li><a href="manage books.html"><i class="fas fa-book"></i> Manage Books</a></li>
          <li><a href="manage members.html"><i class="fas fa-users"></i> Manage Members</a></li>
          <li><a href="reports admin.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
          <li><a href="settings_admin.html"><i class="fas fa-cog"></i> Settings</a></li>
          <li><a href="logout_admin.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul> 
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <div class="settings-container">
        <h2 class="text-center mb-4">⚙️ Settings</h2>
        <form>
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" value="admin">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" value="admin@example.com">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">New Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter new password">
          </div>
          <button type="submit" class="btn btn-primary w-100">Save Changes</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("menuToggle").addEventListener("click", function () {
      document.getElementById("sidebar").classList.toggle("active");
    });
  </script>

</body>
</html>
