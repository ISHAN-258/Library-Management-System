<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      background-color: #f4f4f4;
    }

    .dashboard-container {
      display: flex;
      width: 100%;
    }

    .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            padding: 0;
            position: fixed;
            height: 100vh;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .sidebar-header {
            padding: 20px;
            background: #1a252f;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .sidebar-menu {
            padding: 15px 0;
        }
        .sidebar-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar-menu li {
            position: relative;
        }
        .sidebar-menu li a {
            color: #ecf0f1;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            transition: all 0.3s;
        }
        .sidebar-menu li a:hover {
            background: #34495e;
            color: #fff;
        }
        .sidebar-menu li a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        .sidebar-menu li.active a {
            background: #3498db;
            color: white;
        }

    .main-content {
            flex-grow: 1;
            padding: 30px;
            margin-left: 280px;
            transition: all 0.3s;
        }

    .container-box {
      max-width: 1000px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
      margin: 0 auto;
    }

    .chart-container {
      margin-top: 30px;
    }

    @media (max-width: 768px) {
      .dashboard-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
          <h2><i class="fas fa-book"></i> LIBRARIAN DASHBOARD</h2>
      </div>
      <div class="sidebar-menu">
        <ul>
          <li><a href="books.html"><i class="fas fa-book"></i> Books</a></li>
          <li><a href="studentadd.html"><i class="fas fa-user-plus"></i> Student</a></li>
          <li><a href="issued book.html"><i class="fas fa-book-reader"></i> Books Issued</a></li>
          <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
          <li><a href="issue books.html"><i class="fas fa-sign-out-alt"></i> Issue Book</a></li>
          <li><a href="fine.html"><i class="fas fa-coins"></i> Fine</a></li>
          <li><a href="viewrequested_book.html"><i class="fas fa-book-open"></i> Requested Books</a></li>
          <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </div>
  </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container-box">
        <h2 class="text-center mb-4">📊 Library Reports</h2>

        <div class="chart-container">
          <canvas id="issuedBooksChart"></canvas>
        </div>

        <!-- <div class="chart-container">
          <canvas id="membersChart"></canvas>
        </div>
      </div> -->
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Fetch data from backend
      fetch("http://localhost:3000/api/issues/issueCount")
        .then(response => response.json())
        .then(data => {
          const labels = data.map(item => item.month);
          const counts = data.map(item => item.count);
  
          const issuedBooksCtx = document.getElementById("issuedBooksChart").getContext("2d");
          new Chart(issuedBooksCtx, {
            type: "bar",
            data: {
              labels: labels,
              datasets: [{
                label: "Issued Books",
                data: counts,
                backgroundColor: "#007bff"
              }]
            }
          });
        })
        .catch(error => {
          console.error("Error fetching issue count:", error);
        });
  
      // Static Member Chart (or update this similarly if dynamic)
      const membersCtx = document.getElementById("membersChart").getContext("2d");
      new Chart(membersCtx, {
        type: "line",
        data: {
          labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
          datasets: [{
            label: "New Members",
            data: [20, 30, 40, 50, 60, 80],
            borderColor: "#28a745",
            fill: false
          }]
        }
      });
    });
  </script>
  
</body>
</html>
