<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      min-height: 100vh;
    }
    .dashboard-container {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: #2c3e50;
      color: white;
      padding: 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      transition: all 0.3s;
    }
    .sidebar-header {
      padding: 20px;
      background: #1a252f;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    .sidebar-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }
    .sidebar-menu ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .sidebar-menu li a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: #ecf0f1;
      text-decoration: none;
      transition: background 0.3s;
    }
    .sidebar-menu li a:hover,
    .sidebar-menu li.active a {
      background: #3498db;
      color: white;
    }
    .sidebar-menu li a i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }
    .main-content {
      margin-left: 260px;
      padding: 40px 20px;
      width: 100%;
      height: 100vh;

    }
    .menu-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      background: #343a40;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 4px;
      z-index: 1100;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.active {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
      }
      .menu-toggle {
        display: block;
      }
    }
    .table-container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>

  <!-- Mobile Menu Button -->
  <button class="menu-toggle" id="menuToggle">☰</button>


    <!-- Sidebar -->
    <div class="dashboard-container">
      <aside class="sidebar">
          <div class="sidebar-header">
              <h2><i class="fas fa-book"></i> LIBRARIAN DASHBOARD</h2>
          </div>
          <div class="sidebar-menu">
            <ul>
              <li><a href="books.html"><i class="fas fa-book"></i> Books</a></li>
              <li><a href="studentadd.html"><i class="fas fa-user-plus"></i> Student</a></li>
              <li><a href="issued book.html"><i class="fas fa-book-reader"></i> Books Issued</a></li>
              <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
              <li><a href="issue books.html"><i class="fas fa-sign-out-alt"></i> Issue Book</a></li>
              <li><a href="fine.html"><i class="fas fa-coins"></i> Fine</a></li>
              <li><a href="viewrequested_book.html"><i class="fas fa-book-open"></i> Requested Books</a></li>
              <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
          </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <div class="table-container">
        <h2 class="text-center mb-4">📚 Manage Books</h2>

        <!-- Add Book Form (Initially Hidden) -->
        <div id="bookFormContainer" class="mb-4" style="display: none;">
          <form id="bookForm" class="row g-3 border rounded p-3 bg-light">
            <div class="col-md-4">
              <input type="text" class="form-control" id="bookId" placeholder="Book ID" required name="book_id"/>
            </div>
            <input type="hidden" name="work" id="work" value="add">
            <div class="col-md-4">
              <input type="text" class="form-control" id="bookTitle" placeholder="Book Title" required name="book_title"/>
            </div>
            <div class="col-md-4">
              <input type="text" class="form-control" id="bookAuthor" placeholder="category" required name="Category"/>
            </div>
            <div class="col-12 text-end">
              <button type="submit" class="btn btn-success" id="btn"><i class="fas fa-check"></i> Add Book</button>
            </div>
          </form>
        </div>

        <!-- Add Button -->
        <div class="text-end mb-3">
          <button class="btn btn-primary" onclick="toggleBookForm()">
            <i class="fas fa-plus-circle"></i> Add New Book
          </button>
          
        </div>

        <!-- Book Table -->
        <table class="table table-bordered table-hover">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>category</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookList">
            <tr>
              <td>1</td>
              <td>Book Title 1</td>
              <td>Category 1</td>
              <td>
                <button class="btn btn-warning btn-sm"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // Toggle sidebar on mobile
    document.getElementById("menuToggle").addEventListener("click", function () {
      document.getElementById("sidebar").classList.toggle("active");
    });

    // Toggle Add Book form visibility
    function toggleBookForm() {
      const formContainer = document.getElementById("bookFormContainer");
      formContainer.style.display = formContainer.style.display === "none" ? "block" : "none";
    }

    // Handle Add Book Form submission
    document.getElementById("bookForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const book_id = document.getElementById("bookId").value;
      const book_title = document.getElementById("bookTitle").value;
      const category = document.getElementById("bookAuthor").value;
      const work = document.getElementById("work").value;

      try {
        let response;
        if (work === "add") {
          response = await fetch("http://localhost:3000/api/books/add", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ book_id,book_title,category })
          });
        } else {
          const row = document.querySelector(`button[onclick*="editBook"]`).closest('tr');
          const id = row.getAttribute('data-id');
          response = await fetch(`http://localhost:3000/api/books/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ book_id,book_title,category })
          });
        }
  
        const data = await response.json();
  
        if (response.ok && data.success) {
          alert(""+data.message);
          getBooks();
        } else {
          alert(data.message || "Operation failed");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Something went wrong. Please try again later.");
      }
      // Reset form and hide
      this.reset();
      document.getElementById("work").value = "add";
      document.getElementById("btn").innerHTML = '<i class="fas fa-check"></i> Add Book';
      document.getElementById("bookFormContainer").style.display = "none";
    });

    function getBooks() {
      fetch('http://localhost:3000/api/books')
      .then(response => response.json())
      .then(data => {
        const table = document.getElementById("bookList");
        table.innerHTML = ""; // Clear existing rows
        
          data.forEach(book => {
          const newRow = table.insertRow();
          newRow.setAttribute('data-id', book._id);
          newRow.innerHTML = `
            <td>${book.book_id}</td>
            <td>${book.book_title}</td>
            <td>${book.category}</td>
            <td>
              <button class="btn btn-warning btn-sm" onclick="editBook('${book._id}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn btn-danger btn-sm" onclick="delBooks('${book._id}')"><i class="fas fa-trash-alt"></i> Delete</button>
            </td>
          `;
        });
      })
      .catch(error => console.error('Error fetching books:', error));
      }

      getBooks();

    function editBook(id) {
      // Get the current book data from the table row
      const row = event.target.closest('tr');
      const book_id = row.cells[0].textContent;
      const book_title = row.cells[1].textContent;
      const category = row.cells[2].textContent;

      // Show edit form with current values
      document.getElementById("bookFormContainer").style.display = "block";
      document.getElementById("bookId").value = book_id;
      document.getElementById("bookTitle").value = book_title;
      document.getElementById("bookAuthor").value = category;
      document.getElementById("work").value = "edit";
      document.getElementById("btn").innerHTML = '<i class="fas fa-check"></i> Update Book';

    }

    // Store original form handler
    const originalFormHandler = document.getElementById("bookForm").onsubmit;

    function delBooks(id) {
      if (!confirm('Are you sure you want to delete this book?')) {
        return;
      }
      
      fetch('http://localhost:3000/api/books/' + id, {
        method: 'DELETE'
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert('Book deleted successfully');
          getBooks(); // Refresh the book list
        } else {
          alert(data.message || 'Failed to delete book');
        }
      })
      .catch(error => {
        console.error('Error deleting book:', error);
        alert('Error deleting book. Please try again.');
      });
    }
  </script>
</body>
</html>
