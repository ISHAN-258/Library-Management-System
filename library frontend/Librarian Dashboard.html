<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .dashboard-container {
            display: flex;
            width: 100%;
        }
        .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            padding: 0;
            position: fixed;
            height: 100vh;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .sidebar-header {
            padding: 20px;
            background: #1a252f;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .sidebar-menu {
            padding: 15px 0;
        }
        .sidebar-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar-menu li {
            position: relative;
        }
        .sidebar-menu li a {
            color: #ecf0f1;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            transition: all 0.3s;
        }
        .sidebar-menu li a:hover {
            background: #34495e;
            color: #fff;
        }
        .sidebar-menu li a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        .sidebar-menu li.active a {
            background: #3498db;
            color: white;
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
            margin-left: 280px;
            transition: all 0.3s;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            flex: 1;
            margin: 5px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-size: 18px;
        }
        .charts {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .chart {
            background: white;
            padding: 30px;
            flex: 1;
            margin: 5px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const searchInput = document.querySelector("input");
            searchInput.addEventListener("input", function() {
                console.log("Searching: " + searchInput.value);
            });
        });
    </script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-book"></i> LIBRARIAN DASHBOARD</h2>
            </div>
            <div class="sidebar-menu">
                <ul>
                    <li><a href="books.html"><i class="fas fa-book"></i> Books</a></li>
                    <li><a href="studentadd.html"><i class="fas fa-user-plus"></i> Student</a></li>
                    <li><a href="issued book.html"><i class="fas fa-book-reader"></i>Books Issued </a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
                    <li><a href="issue books.html"><i class="fas fa-sign-out-alt"></i>Issue book</a></li>
                    <li><a href="fine.html"><i class="fas fa-chart-bar"></i>Fine</a></li>
                    <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                  </ul>
            </div>
        </aside>
        <main class="main-content">
            <header>
                <h1>Library Dashboard</h1>
                <input type="text" placeholder="Search...">
            </header>
            <section class="stats">
                <div class="card">📖 Total Books: <span>1200</span></div>
                <div class="card">👥 Active Members: <span>450</span></div>
                <div class="card">📅 Issued Today: <span>35</span></div>
                <div class="card">🚀 Overdue Books: <span>12</span></div>
            </section>
            <section class="charts">
                <div class="chart" id="books-chart">📊 Books Issued Chart</div>
                <div class="chart" id="members-chart">📈 Membership Growth</div>
            </section>
        </main>
    </div>
</body>
</html>
