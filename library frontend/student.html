<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #36d1dc, #5b86e5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 15px;
    }

    .login-container {
      background: #ffffff;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.5s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #1c3b70;
    }

    .form-group {
      position: relative;
    }

    .form-group i {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #888;
    }

    .form-control {
      padding-left: 40px;
    }

    .btn-primary {
      background-color: #1c3b70;
      border: none;
    }

    .btn-primary:hover {
      background-color: #16335f;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 576px) {
      .login-container {
        padding: 25px;
      }
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>🎓 Student Login</h2>
    <form id="studentLoginForm">
      <div class="form-group mb-3">
        <i class="fas fa-user"></i>
        <input type="text" id="studentUsername" class="form-control" placeholder="Student ID" required>
      </div>
      <div class="form-group mb-4">
        <i class="fas fa-lock"></i>
        <input type="password" id="studentPassword" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
  </div>

  <script>
   document.getElementById("studentLoginForm").addEventListener("submit", async function(event) {
  event.preventDefault();
  const username = document.getElementById("studentUsername").value.trim();
  const password = document.getElementById("studentPassword").value.trim();
  
  try {
    const response = await fetch("http://localhost:3000/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email: username, password })
    });

    const data = await response.json();

    if (response.ok) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      // window.location.href = "http://127.0.0.1:5500/student%20dashboard.html";
      window.location.href = "student dashboard.html";
    } else {
      alert(data.message || "Login failed. Please check your credentials.");
    }
  } catch (error) {
    console.error("Login error:", error);
    alert("Something went wrong. Please try again later.");
  }
});

  </script>
</body>
</html>
