<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librarian Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #43cea2, #185a9d);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 15px;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.5s ease-in-out;
    }

    .login-box h3 {
      margin-bottom: 25px;
      font-size: 1.7rem;
      color: #185a9d;
      text-align: center;
    }

    .form-group {
      position: relative;
    }

    .form-group i {
      position: absolute;
      left: 12px;
      top: 12px;
      color: #999;
    }

    .form-control {
      padding-left: 40px;
    }

    .btn-success {
      background-color: #185a9d;
      border: none;
    }

    .btn-success:hover {
      background-color: #144b81;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 576px) {
      .login-box {
        padding: 20px;
      }
      .login-box h3 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h3>📚 Librarian Login</h3>
    <form id="librarianLoginForm">
      <div class="form-group mb-3">
        <i class="fas fa-user"></i>
        <input type="text" class="form-control" id="librarianId" placeholder="Librarian ID" required>
      </div>
      <div class="form-group mb-4">
        <i class="fas fa-lock"></i>
        <input type="password" class="form-control" id="librarianPassword" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Login</button>
    </form>
  </div>

  <script>
    document.getElementById("librarianLoginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const email = document.getElementById("librarianId").value.trim();
      const password = document.getElementById("librarianPassword").value.trim();
  
      try {
        const response = await fetch("http://localhost:3000/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });
  
        const data = await response.json();
  
        if (response.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "Librarian Dashboard.html";
        } else {
          alert(data.message || "Login failed. Please check your credentials.");
        }
      } catch (error) {
        console.error("Login error:", error);
        alert("❌ Something went wrong. Please try again later.");
      }
    });
  </script>
</body>
</html>
