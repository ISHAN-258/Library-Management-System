<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #8cbdf8;
      font-family: 'Segoe UI', sans-serif;
      padding-top: 60px;
      /* background-image: url('./imge/books.jpg'); */
    }

    .search-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .search-header h2 {
      font-weight: 700;
      color: #343a40;
    }

    .search-box {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .book-result {
      margin-top: 25px;
    }

    .card-title {
      font-weight: 600;
      color: #0d6efd;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="search-header">
      <h2>🔍 Search Books in Library</h2>
      <p class="text-muted">Find books by title and category</p>
    </div>

    <div class="search-box">
      <div class="row g-3">
        <div class="col-md-6">
          <input type="text" id="searchInput" class="form-control" placeholder="Search by book title...">
        </div>
        <div class="col-md-4">
          <select id="categorySelect" class="form-select">
            <option value="">All Categories</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Literature">Literature</option>
            <option value="History">History</option>
            <option value="Science">Science</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100" onclick="searchBook()">Search</button>
        </div>
      </div>

      <div class="book-result" id="resultsContainer"></div>
    </div>
  </div>

  <script>
    function searchBook() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const category = document.getElementById("categorySelect").value;

      const url = `http://localhost:3000/api/books/search/book?query=${encodeURIComponent(query)}&category=${encodeURIComponent(category)}`;
      
      fetch(url)
        .then(response => response.json())
        .then(data => {
          const results = data.results || [];
          const container = document.getElementById("resultsContainer");
          container.innerHTML = "";

          if (results.length === 0) {
            container.innerHTML = `<p class="text-danger mt-3">No books found.</p>`;
            return;
          }

          results.forEach(book => {
            const bookCard = `
              <div class="card mb-3 shadow-sm">
                <div class="card-body">
                  <h5 class="card-title">${book.book_title}</h5>
                  <p class="card-text"><strong>Category:</strong> ${book.category || 'N/A'}</p>
                  <p class="card-text"><strong>ID:</strong> ${book.book_id}</p>
                </div>
              </div>
            `;
            container.innerHTML += bookCard;
          });
        })
        .catch(err => {
          console.error(err);
          document.getElementById("resultsContainer").innerHTML = `<p class="text-danger mt-3">Something went wrong!</p>`;
        });
    }
  </script>

</body>
</html>
