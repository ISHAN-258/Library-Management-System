<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logout - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
    }

    .dashboard-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #2c3e50;
      color: white;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }

    .sidebar-header {
      padding: 20px;
      background: #1a252f;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .sidebar-menu ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar-menu li a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: #ecf0f1;
      text-decoration: none;
      transition: background 0.3s;
    }

    .sidebar-menu li a:hover,
    .sidebar-menu li.active a {
      background: #3498db;
      color: white;
    }

    .sidebar-menu li a i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }

    .main-content {
      margin-left: 260px;
      padding: 40px 20px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logout-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      max-width: 400px;
    }

    .logout-container h3 {
      margin-bottom: 20px;
    }

    .logout-container button {
      width: 100%;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      .sidebar.active {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-user-shield"></i> ADMIN PANEL</h2>
      </div>
      <div class="sidebar-menu">
        <ul>
          <li><a href="admindashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
          <li><a href="manage books.html"><i class="fas fa-book"></i> Manage Books</a></li>
          <li><a href="manage members.html"><i class="fas fa-users"></i> Manage Members</a></li>
          <li><a href="reports admin.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
          <li><a href="settings_admin.html"><i class="fas fa-cog"></i> Settings</a></li>
          <li><a href="logout_admin.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul> 
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <div class="logout-container">
        <h3>🔒 Are you sure you want to logout?</h3>
        <button class="btn btn-danger" onclick="logout()">Yes, Logout</button>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      // Example: Redirect to login page or homepage
      window.location.href = "admin.html"; // change this path as per your project
    }
  </script>

</body>
</html>
