<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      overflow-x: hidden;
    }
    .dashboard-container {
      display: flex;
      flex-direction: column;
    }
    .sidebar {
      width: 280px;
      background: #2c3e50;
      color: white;
      padding: 0;
      position: fixed;
      height: 100vh;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      transition: all 0.3s;
      z-index: 1000;
    }
    .sidebar-header {
      padding: 20px;
      background: #1a252f;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 600;
    }
    .sidebar-menu {
      padding: 15px 0;
    }
    .sidebar-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar-menu li a {
      color: #ecf0f1;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 12px 20px;
      transition: all 0.3s;
    }
    .sidebar-menu li a:hover {
      background: #34495e;
      color: #fff;
    }
    .sidebar-menu li a i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }
    .sidebar-menu li.active a {
      background: #3498db;
      color: white;
    }
    .main-content {
      margin-left: 280px;
      padding: 20px;
      transition: all 0.3s;
    }
    .menu-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1001;
      background: #343a40;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-280px);
      }
      .sidebar.active {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
      }
      .menu-toggle {
        display: block;
      }
    }

    .report-container {
      max-width: 900px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle">☰ Menu</button>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-user-shield"></i> ADMIN PANEL</h2>
      </div>
      <div class="sidebar-menu">
        <ul>
          <li><a href="admindashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
          <li><a href="manage books.html"><i class="fas fa-book"></i> Manage Books</a></li>
          <li><a href="manage members.html"><i class="fas fa-users"></i> Manage Members</a></li>
          <li><a href="reports admin.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
          <li><a href="settings_admin.html"><i class="fas fa-cog"></i> Settings</a></li>
          <li><a href="logout_admin.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul> 
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="report-container">
        <h2 class="text-center mb-4">📊 Reports</h2>
        <button class="btn btn-primary mb-3" onclick="generateReport()">📄 Generate Report</button>
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Report ID</th>
              <th>Report Name</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reportList">
            <tr>
              <td>1</td>
              <td>Monthly Issued Books</td>
              <td>March 2025</td>
              <td>
                <button class="btn btn-success btn-sm">View</button>
                <button class="btn btn-danger btn-sm">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    document.getElementById("menuToggle").addEventListener("click", function () {
      document.getElementById("sidebar").classList.toggle("active");
    });

    function generateReport() {
      alert("Feature to generate reports will be implemented soon!");
    }
  </script>
</body>
</html>
