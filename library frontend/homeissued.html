<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issued Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #f1f8e9);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container-main {
      max-width: 1200px;
      margin: 50px auto;
      padding: 30px;
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .title-bar h2 {
      font-weight: 700;
      color: #2c3e50;
    }

    .title-bar i {
      font-size: 1.5rem;
      color: #1976d2;
    }

    .table thead {
      background-color: #1976d2;
      color: white;
    }

    .badge-success {
      background-color: #4caf50;
    }

    .badge-warning {
      background-color: #ffc107;
      color: #000;
    }

    .badge-danger {
      background-color: #e53935;
    }

    @media (max-width: 768px) {
      .container-main {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container container-main">
    <div class="title-bar">
      <h2><i class="fas fa-book-reader me-2"></i>Issued Books</h2>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle text-center">
        <thead>
          <tr>
            <th>#</th>
            <th>Student Email</th>
            <th>Book Title</th>
            <th>Issue Date</th>
            <th>Return Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="booksList">
          <!-- Dynamic Rows -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const tableBody = document.getElementById('booksList');
  
      try {
        const response = await fetch("http://localhost:3000/api/issues/issue");
        const data = await response.json();
  
        if (!Array.isArray(data)) throw new Error("Invalid data format");
  
        tableBody.innerHTML = ""; // Clear previous rows
  
        data.forEach((book, index) => {
          const issueDate = new Date(book.issueDate).toLocaleDateString();
          const returnDate = new Date(book.returnDate).toLocaleDateString();
  
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${book.studentEmail}</td>
            <td>${book.bookTitle}</td>
            <td>${issueDate}</td>
            <td>${returnDate}</td>
            <td>
              <span class="badge ${
                book.status === "Returned"
                  ? "badge-success"
                  : book.status === "Pending"
                  ? "badge-warning"
                  : "badge-danger"
              }">${book.status}</span>
            </td>
          `;
          tableBody.appendChild(row);
        });
      } catch (error) {
        console.error("Error fetching issued books:", error);
        tableBody.innerHTML = `<tr><td colspan="6">Failed to load issued books.</td></tr>`;
      }
    });
  </script>
</body>
</html>
