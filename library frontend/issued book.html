<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issued Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .sidebar {
      width: 280px;
      background: #2c3e50;
      color: white;
      padding: 0;
      position: fixed;
      height: 100vh;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: all 0.3s;
    }

    .sidebar-header {
      padding: 20px;
      background: #1a252f;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .sidebar-menu {
      padding: 15px 0;
    }

    .sidebar-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar-menu li {
      position: relative;
    }

    .sidebar-menu li a {
      color: #ecf0f1;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 12px 20px;
      transition: all 0.3s;
    }

    .sidebar-menu li a:hover {
      background: #34495e;
      color: #fff;
    }

    .sidebar-menu li a i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }

    .sidebar-menu li.active a {
      background: #14191d;
      color: white;
    }

    .main-content {
      flex-grow: 1;
      padding: 30px;
      margin-left: 280px;
    }

    .table-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    h2 {
      font-weight: 600;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
        <h2><i class="fas fa-book"></i> LIBRARIAN DASHBOARD</h2>
    </div>
    <div class="sidebar-menu">
      <ul>
        <li><a href="books.html"><i class="fas fa-book"></i> Books</a></li>
        <li><a href="studentadd.html"><i class="fas fa-user-plus"></i> Student</a></li>
        <li><a href="issued book.html"><i class="fas fa-book-reader"></i> Books Issued</a></li>
        <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
        <li><a href="issue books.html"><i class="fas fa-sign-out-alt"></i> Issue Book</a></li>
        <li><a href="fine.html"><i class="fas fa-coins"></i> Fine</a></li>
        <li><a href="viewrequested_book.html"><i class="fas fa-book-open"></i> Requested Books</a></li>
        <li><a href="logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </div>
</aside>

  <main class="main-content">
    <div class="table-container">
      <h2>📘 Issued Books</h2>
      <table class="table table-striped table-hover" id="issuedBooksTable">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Member Name</th>
            <th>Book Title</th>
            <th>Issue Date</th>
            <th>Return Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="booksList">
          <!-- Dynamic Data from Backend -->
        </tbody>
      </table>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const tableBody = document.getElementById('booksList');
  
      try {
        const response = await fetch("http://localhost:3000/api/issues/issue");
        const result = await response.json();
        const books = result.data; // ✅ Correctly accessing the array
  
        if (!Array.isArray(books)) throw new Error("Invalid data format");
  
        tableBody.innerHTML = ""; // Clear previous rows
  
        books.forEach((book, index) => {
          const issueDate = new Date(book.issueDate).toLocaleDateString();
          const returnDate = new Date(book.returnDate).toLocaleDateString();
  
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${book.studentEmail}</td>
            <td>${book.bookTitle}</td>
            <td>${issueDate}</td>
            <td>${returnDate}</td>
            <td>
              <span class="badge bg-${
                book.status === "Returned"
                  ? "success"
                  : book.status === "Pending"
                  ? "warning"
                  : "danger"
              }">${book.status}</span>
            </td>
          `;
          tableBody.appendChild(row);
        });
      } catch (error) {
        console.error("Error fetching issued books:", error);
        tableBody.innerHTML = `<tr><td colspan="6">Failed to load issued books.</td></tr>`;
      }
    });
  </script>
  
  
</body>
</html>
